<!DOCTYPE html>
<html>

<head>
    <title>Order</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Order Coffee ☕</h1>

    <div class="menu">
        <button onclick="addToCart('Caramel Latte',130)">Caramel Latte</button>
        <button onclick="addToCart('Iced Americano',110)">Iced Americano</button>
        <button onclick="addToCart('Mocha Frappe',150)">Mocha Frappe</button>
    </div>

    <ul id="cartList"></ul>

    <h3>Total: ₱<span id="total">0</span></h3>

    <h3>Payment Method</h3>
    <select id="payment">
        <option>Cash</option>
        <option>GCash</option>
    </select>

    <button onclick="placeOrder()">Checkout</button>

    <script src="script.js"></script>

</body>

</html>
